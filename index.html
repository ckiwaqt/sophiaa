<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(135deg, #ee9194, #fecfef, #fad0c4);
        background-size: 400% 400%;
        animation: gradientMove 10s ease infinite, colorCycle 30s linear infinite;
        font-family: "Quicksand", sans-serif;
      }

      @keyframes gradientMove {
        0% {
          background-position: left;
        }
        50% {
          background-position: right;
        }
        100% {
          background-position: left;
        }
      }

      @keyframes colorCycle {
        0% {
          background-image: linear-gradient(135deg, #ee9194, #fecfef, #fad0c4);
        }
        20% {
          background-image: linear-gradient(135deg, #ff6b6b, #ffb3b3, #ffd6cc);
        }
        40% {
          background-image: linear-gradient(135deg, #8de3a0, #c9f7d3, #eafff0);
        }
        60% {
          background-image: linear-gradient(135deg, #ffe066, #fff3b0, #fffaf0);
        }
        80% {
          background-image: linear-gradient(135deg, #ffffff, #fef6f9, #ffe9f0);
        }
        100% {
          background-image: linear-gradient(135deg, #ee9194, #fecfef, #fad0c4);
        }
      }

      .floating {
        position: absolute;
        bottom: -100px;
        animation: floatUp linear infinite;
        opacity: 0.8;
        z-index: 0;
        pointer-events: none;
      }

      @keyframes floatUp {
        from {
          transform: translateY(0) rotate(0deg);
        }
        to {
          transform: translateY(-120vh) rotate(360deg);
        }
      }


      .sparkle {
        position: absolute;
        color: white;
        opacity: 0.7;
        animation: twinkle 2s infinite alternate;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes twinkle {
        from {
          opacity: 0.3;
          transform: scale(1);
        }
        to {
          opacity: 1;
          transform: scale(1.4);
        }
      }


      .card {
        animation: fadeIn 1.5s ease;
        backdrop-filter: blur(14px);
        background: rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 35px rgba(255, 105, 180, 0.25);
      }

      @keyframes fadeIn {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .card-float {
        animation: cardFloat 4s ease-in-out infinite;
      }

      @keyframes cardFloat {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
        100% {
          transform: translateY(0px);
        }
      }


      .glow {
        animation: glow 2s infinite alternate;
      }

      @keyframes glow {
        from {
          text-shadow: 0 0 10px #ff4da6;
        }
        to {
          text-shadow: 0 0 25px #ff1493;
        }
      }


      .text-shadow {
        text-shadow: 0 2px 10px rgba(255, 255, 255, 0.4),
          0 0 20px rgba(255, 105, 180, 0.3);
      }


      .soft-pulse {
        animation: softPulse 2s infinite;
      }

      @keyframes softPulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
        100% {
          transform: scale(1);
        }
      }


      .cute-btn {
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
      }

      .cute-btn:hover {
        box-shadow: 0 0 35px rgba(255, 105, 180, 0.8);
      }

      .cute-btn::before {
        content: "";
        position: absolute;
        top: -120%;
        left: -40%;
        width: 50%;
        height: 300%;
        background: rgba(255, 255, 255, 0.4);
        transform: rotate(25deg);
        animation: shine 3s infinite;
      }

      @keyframes shine {
        0% {
          left: -60%;
        }
        100% {
          left: 130%;
        }
      }


      .blur-heart {
        position: absolute;
        font-size: 120px;
        opacity: 0.18;
        filter: blur(2px);
        z-index: 0;
        animation: floatHeart 6s ease-in-out infinite;
        pointer-events: none;
      }

      .heart1 {
        top: 10%;
        left: 8%;
      }

      .heart2 {
        bottom: 12%;
        right: 10%;
        animation-delay: 2s;
      }

      .heart3 {
        top: 50%;
        right: 15%;
        animation-delay: 4s;
      }

      .heart4 {
        bottom: 5%;
        right: 3%;
        animation-delay: 4s;
      }
      .heart5 {
        bottom: 6%;
        left: 3%;
        animation-delay: 1.5s;
      }

      .heart6 {
        bottom: 25%;
        left: 18%;
        animation-delay: 3s;
      }

      @keyframes floatHeart {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-15px);
        }
        100% {
          transform: translateY(0px);
        }
      }

      @media (max-width: 640px) {
        .blur-heart {
          font-size: 60px;
        }
        .card {
          padding: 1.5rem !important;
        }
      }

      .countdown-banner {
        position: relative;
        z-index: 10;
        margin-bottom: 12px;
        padding: 8px 20px;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(8px);
        color: #831843;
        font-weight: 700;
        text-align: center;
        font-size: 14px;
      }

      @media (min-width: 640px) {
        .countdown-banner {
          font-size: 16px;
        }
      }
    </style>
  </head>

  <body class="min-h-screen flex flex-col items-center justify-center px-4 relative">

    <div id="countdownBanner" class="countdown-banner"></div>

    <script>
      for (let i = 0; i < 25; i++) {
        const heart = document.createElement("div");

        heart.innerHTML = ["🎈", "✨", "🎂", "🎉"][
          Math.floor(Math.random() * 4)
        ];

        heart.className = "floating text-2xl";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = 5 + Math.random() * 7 + "s";
        heart.style.fontSize = 20 + Math.random() * 25 + "px";

        document.body.appendChild(heart);
      }
    </script>


    <script>
      for (let i = 0; i < 40; i++) {
        const sparkle = document.createElement("div");

        sparkle.innerHTML = "✦";
        sparkle.className = "sparkle";

        sparkle.style.left = Math.random() * 100 + "vw";
        sparkle.style.top = Math.random() * 100 + "vh";
        sparkle.style.fontSize = 10 + Math.random() * 20 + "px";
        sparkle.style.animationDuration = 1 + Math.random() * 3 + "s";

        document.body.appendChild(sparkle);
      }
    </script>


    <div class="blur-heart heart1">🩷</div>
    <div class="blur-heart heart2">🥳</div>
    <div class="blur-heart heart3">🎀</div>
    <div class="blur-heart heart4">🎁</div>
    <div class="blur-heart heart5">🎊</div>
    <div class="blur-heart heart6">🍰</div>

    <div
      class="card card-float border border-pink-200/40 rounded-3xl p-8 max-w-lg w-full text-center relative z-10"
    >
      <div class="space-y-5">
        <h1
          id="line1"
          class="text-3xl sm:text-4xl font-extrabold text-pink-900 text-shadow leading-tight min-h-[50px] sm:min-h-[60px]"
        ></h1>

        <p
          id="line2"
          class="text-pink-800 text-lg sm:text-xl font-bold soft-pulse text-shadow min-h-[30px] sm:min-h-[35px]"
        ></p>

        <h2
          id="line3"
          class="text-lg sm:text-xl text-pink-900 font-semibold text-shadow min-h-[30px] sm:min-h-[35px]"
        ></h2>

        <p
          id="line4"
          class="text-pink-900 text-sm sm:text-base leading-relaxed text-shadow min-h-[130px] sm:min-h-[110px]"
        ></p>

        <div id="line5" class="text-4xl sm:text-5xl soft-pulse min-h-[50px] sm:min-h-[60px]"></div>

        <div class="bg-white/30 rounded-2xl p-4">
          <p
            id="line6"
            class="text-pink-800 text-sm sm:text-base font-medium text-shadow min-h-[30px] transition-opacity duration-300"
          ></p>
        </div>
      </div>


      <button
        onclick="celebrate()"
        class="cute-btn mt-6 px-8 py-4 bg-gradient-to-r from-pink-400 to-pink-500 hover:from-pink-500 hover:to-pink-600 active:scale-95 transition-all duration-300 text-white rounded-2xl text-lg font-bold"
      >
        Click for Surprise?!
      </button>


      <div
        id="surprise"
        class="hidden mt-6 text-xl sm:text-2xl text-pink-900 text-shadow font-bold animate-bounce"
      ></div>


    <audio id="music" loop>
      <source src="lol.mp3" type="audio/mpeg" />
    </audio>

    <script>


      const messages = [
        {
          id: "line1",
          text: "Happy Birthday Auntie",
        },
        {
          id: "line2",
          text: "生日快乐 Sophia ♡",
        },
        {
          id: "line3",
          text: "For The Most Special Girl",
        },
        {
          id: "line4",
          text: "I hope this special day is filled with the sweet love and happiness you deserve and that you make tons of memories that make you smile! You deserve everything truly and I'm looking forward to seeing you grow - forever your loser bum jy",
        },
        {
          id: "line5",
          text: "𐙚❶ ❾𐙚",
        },
      ];

      async function typeLine(elementId, text, speed = 28) {
        const element = document.getElementById(elementId);

        for (let i = 0; i < text.length; i++) {
          element.innerHTML += text.charAt(i);

          await new Promise((resolve) => setTimeout(resolve, speed));
        }
      }

      async function startTyping() {
        for (const msg of messages) {
          await typeLine(msg.id, msg.text);

          await new Promise((resolve) => setTimeout(resolve, 400));
        }
      }

      startTyping();

      const quotes = [
        "Enjoy this day and celebrate it with your loved ones",
        "Smile and be happy today!",
        "So lucky to have you in my life",
        "Best day goes to the best ykwim",
        "You deserve all the happiness in the world",
        "Wishing you a day as amazing as you are",
        "Hope this year brings you everything youve been wishing for",
      ];

      let quoteIndex = 0;

      async function startQuoteCycle() {
        const el = document.getElementById("line6");

        await new Promise((resolve) => setTimeout(resolve, 9000));

        while (true) {
          el.style.opacity = 0;
          await new Promise((resolve) => setTimeout(resolve, 400));

          el.textContent = quotes[quoteIndex];
          el.style.opacity = 1;

          quoteIndex = (quoteIndex + 1) % quotes.length;

          await new Promise((resolve) => setTimeout(resolve, 4500));
        }
      }

      startQuoteCycle();


      function updateCountdown() {
        const birthday = new Date("2026-07-16T00:00:00");
        const now = new Date();
        const banner = document.getElementById("countdownBanner");

        const startOfBday = new Date(birthday);
        const endOfBday = new Date(birthday);
        endOfBday.setDate(endOfBday.getDate() + 1);

        if (now >= startOfBday && now < endOfBday) {
          banner.textContent = " It's your BDAYYY! YAYYYYYYY!";
          return;
        }

        if (now >= endOfBday) {
          banner.textContent = "Hope you had the best birthday!";
          return;
        }

        const diffMs = startOfBday - now;
        const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diffMs / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diffMs / (1000 * 60)) % 60);

        banner.textContent = `✨ ${days}d ${hours}h ${minutes}m until your birthday! ✨`;
      }

      updateCountdown();
      setInterval(updateCountdown, 60000);


      function celebrate() {
        const music = document.getElementById("music");

        setTimeout(() => {
          music.play();
        }, 300);

        document.getElementById("surprise").classList.remove("hidden");

        confetti({
          particleCount: 250,
          spread: 120,
          startVelocity: 45,
          scalar: 1.2,
          origin: { y: 0.6 },
        });

        setTimeout(() => {
          confetti({
            particleCount: 120,
            angle: 60,
            spread: 70,
            origin: { x: 0 },
          });

          confetti({
            particleCount: 120,
            angle: 120,
            spread: 70,
            origin: { x: 1 },
          });
        }, 300);

        let duration = 3000;
        let end = Date.now() + duration;

        (function frame() {
          confetti({
            particleCount: 6,
            spread: 55,
            origin: {
              x: Math.random(),
              y: Math.random() - 0.2,
            },
          });

          if (Date.now() < end) {
            requestAnimationFrame(frame);
          }
        })();
      }


      document.addEventListener("mousemove", (e) => {
        const star = document.createElement("div");

        star.innerHTML = "✦";

        star.style.position = "absolute";
        star.style.left = e.pageX + "px";
        star.style.top = e.pageY + "px";
        star.style.color = "white";
        star.style.fontSize = "12px";
        star.style.pointerEvents = "none";
        star.style.opacity = "0.8";
        star.style.zIndex = "999";
        star.style.transition = "all 0.8s ease";

        document.body.appendChild(star);

        setTimeout(() => {
          star.style.transform = "translateY(-20px) scale(0)";
          star.style.opacity = "0";
        }, 10);

        setTimeout(() => {
          star.remove();
        }, 800);
      });
    </script>
  </body>
</html>
